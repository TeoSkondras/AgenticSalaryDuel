version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=${MONGODB_DB:-agenticsalaryduel}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GPT_MODEL=${GPT_MODEL:-gpt-5-nano}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/admin/health']
      interval: 30s
      timeout: 10s
      retries: 3
